name: Optimize images
on:
  push:
    paths:
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.webp'
  workflow_dispatch: {}

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet Pillow
      - run: python3 scripts/optimize-images.py
      - name: Commit any wins back to the branch
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "smartlawn-image-bot"
            git config user.email "smartlawn-bot@users.noreply.github.com"
            git add -A
            git commit -m "auto: optimize images (CI)"
            git push
          else
            echo "Nothing to commit — all images already optimized."
          fi
